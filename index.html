<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Education Network</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo-container">
            <img src="images/logo.png" alt="GEN Logo" class="main-logo">
        </div>
        <ul class="nav-links">
            <li><a href="#mission">მისია</a></li>
            <li><a href="#programs">საერთაშორისო პროგრამები</a></li>
            <li><a href="#languages">ენების კურსები</a></li>
            <li><a href="#university">უნივერსიტეტში ჩაბარება</a></li>
        </ul>
        <div class="lang-switch">
            <button class="active">GE</button>
            <button>EN</button>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-overlay">
            <div class="hero-content">
                <h1>Global Education Network</h1>
                <p class="oxford-badge">ოქსფორდის პირველი და ერთადერთი ოფიციალური წარმომადგენელი საქართველოში</p>
                <div class="hero-btns">
                    <button class="btn-red">Apply Now</button>
                </div>
            </div>
        </div>
    </header>

    <section id="university" class="consultants">
        <h2>უნივერსიტეტში ჩაბარების მომსახურება</h2>
        <div class="consultant-grid">
            <div class="c-card available">
                <div class="img-frame"><img src="images/cons1.jpg" alt="Consultant 1"><div class="glow"></div></div>
                <h3>კონსულტანტი 1</h3>
                <button onclick="alert('ზარი მოთხოვნილია!')">Request a Call</button>
            </div>
            <div class="c-card busy">
                <div class="img-frame"><img src="images/cons2.jpg" alt="Consultant 2"></div>
                <h3>კონსულტანტი 2</h3>
                <button disabled>Unavailable</button>
            </div>
            <div class="c-card available">
                <div class="img-frame"><img src="images/cons3.jpg" alt="Consultant 3"><div class="glow"></div></div>
                <h3>კონსულტანტი 3</h3>
                <button onclick="alert('ზარი მოთხოვნილია!')">Request a Call</button>
            </div>
        </div>
    </section>

</body>
</html>
