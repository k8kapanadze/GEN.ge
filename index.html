<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Education Network | Premium Education</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <img src="images/logo.png.jpeg" alt="GEN" class="logo">
            <ul class="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#programs">Programs</a></li>
                <li><a href="#university">University</a></li>
                <li><a href="#gallery">Gallery</a></li>
            </ul>
            <div class="nav-right">
                <button id="lang-btn">EN</button>
                <div class="cart-trigger" onclick="toggleCart()">
                    <i class="fas fa-shopping-bag"></i>
                    <span id="cart-count">0</span>
                </div>
            </div>
        </div>
    </nav>

    <section id="home" class="hero-split">
        <div class="hero-video-container">
            <img src="images/hero-bg.jpg.jpeg" class="hero-bg-img">
            <div class="hero-overlay"></div>
        </div>
        <div class="hero-text">
            <h1 class="glitch">GLOBAL<br><span class="red-text">EDUCATION</span> NETWORK</h1>
            <p>ოქსფორდის პირველი და ერთადერთი ოფიციალური წარმომადგენელი საქართველოში</p>
            <div class="hero-actions">
                <a href="#programs" class="btn-primary">Explore Programs</a>
                <a href="#university" class="btn-outline">Book Consultant</a>
            </div>
        </div>
    </section>

    <section id="gallery" class="section container">
        <h2 class="title-center">Life at GEN</h2>
        <div class="gallery-grid">
            <div class="gallery-item">
                <img src="images/pic1.jpg.jpeg" class="blur-img">
                <div class="gallery-overlay"><span>View Details</span></div>
            </div>
            <div class="gallery-item">
                <img src="images/pic2.jpg.jpeg" class="blur-img">
                <div class="gallery-overlay"><span>View Details</span></div>
            </div>
            <div class="gallery-item">
                <img src="images/pic3.jpg.jpeg" class="blur-img">
                <div class="gallery-overlay"><span>View Details</span></div>
            </div>
        </div>
    </section>

    <div id="side-cart" class="side-cart">
        <div class="cart-header">
            <h3>My Selection</h3>
            <i class="fas fa-times" onclick="toggleCart()"></i>
        </div>
        <div id="cart-content"></div>
        <div class="cart-footer">
            <input type="text" placeholder="Full Name" id="u-name">
            <input type="email" placeholder="Email" id="u-email">
            <button class="btn-submit">Submit Inquiry</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
