<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Education Network</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">
            <img src="images/logo.png" alt="GEN Logo">
        </div>
        <ul class="nav-links">
            <li><a href="#mission">მისია</a></li>
            <li><a href="#programs">საერთაშორისო პროგრამები</a></li>
            <li><a href="#languages">ენების კურსები</a></li>
            <li><a href="#university">უნივერსიტეტში ჩაბარება</a></li>
        </ul>
        <div class="lang-switch">
            <button onclick="setLanguage('ka')">GE</button>
            <button onclick="setLanguage('en')">EN</button>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1>გლობალური განათლების ქსელი</h1>
            <p class="subtitle">ოქსფორდის პირველი და ერთადერთი ოფიციალური წარმომადგენელი საქართველოში</p>
            <button class="cta-btn">Apply Now</button>
        </div>
    </header>

    <section id="university" class="consultants-section">
        <h2>უნივერსიტეტში ჩაბარების მომსახურება</h2>
        <div class="consultant-grid" id="consultantGrid">
            <div class="consultant-card available">
                <div class="img-wrapper">
                    <img src="images/consultant1.jpg" alt="Consultant 1">
                    <div class="glow"></div>
                </div>
                <h3>კონსულტანტი 1</h3>
                <button onclick="requestCall('კონსულტანტი 1')">Request a Call</button>
            </div>

            <div class="consultant-card busy">
                <div class="img-wrapper">
                    <img src="images/consultant2.jpg" alt="Consultant 2">
                </div>
                <h3>კონსულტანტი 2</h3>
                <button disabled>ადგილები არ არის</button>
            </div>
            
            <div id="cons-3" class="consultant-card available">
                </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
